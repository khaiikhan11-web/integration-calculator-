<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Integration & Area Calculator</title>
    <style>
        :root {
            --primary: #475569;
            --accent: #2563eb;
            --bg: #f8fafc;
            --panel: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { margin-bottom: 5px; color: var(--primary); }
        p { margin-top: 0; color: #64748b; font-size: 0.95rem; }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label { font-weight: 600; font-size: 0.9rem; color: #475569; }
        input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: #f1f5f9;
            border-left: 4px solid var(--accent);
            border-radius: 4px;
        }
        .result-title { font-size: 0.85rem; text-transform: uppercase; color: #64748b; font-weight: bold; }
        .result-value { font-size: 1.6rem; font-weight: bold; color: #0f172a; margin-top: 5px; }
        .graph-area {
            flex: 1.2;
            display: flex;
            justify-center: center;
            align-items: center;
        }
        canvas {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fafafa;
        }
        .error { color: #dc2626; font-size: 0.85rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <h2>Integration & Area Visualizer</h2>
    <p>A simple, lightweight alternative to Desmos for definite integrals.</p>

    <div class="container">
        <div class="controls">
            <div class="input-group">
                <label for="fx">Function f(x)</label>
                <input type="text" id="fx" value="x^2 - 4x + 5" placeholder="e.g., x^2, sin(x), 2*x">
                <div id="error-msg" class="error">Invalid math expression.</div>
            </div>
            <div class="input-group">
                <label for="boundA">Lower Bound (a)</label>
                <input type="number" id="boundA" value="1" step="0.5">
            </div>
            <div class="input-group">
                <label for="boundB">Upper Bound (b)</label>
                <input type="number" id="boundB" value="3" step="0.5">
            </div>

            <div class="result-box">
                <div class="result-title">Definite Integral Value</div>
                <div class="result-value" id="integral-result">0.00</div>
            </div>
        </div>

        <div class="graph-area">
            <canvas id="graphCanvas" width="450" height="400"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        
        // Graph configuration
        const scale = 40; // Pixels per unit
        const originX = canvas.width / 2;
        const originY = canvas.height - 80; // Adjusted down to show curves better

        // Safe evaluation function for standard user inputs
        function parseMath(x, str) {
            // Replace algebraic shortcodes like 4x with 4*x
            let formatted = str.replace(/(\d+)(x)/g, '$1*$2');
            // Handle basic powers x^2 -> Math.pow(x,2)
            formatted = formatted.replace(/x\^(\d+)/g, 'Math.pow(x,$1)');
            // Inject Math functions safely
            formatted = formatted.replace(/sin/g, 'Math.sin')
                                 .replace(/cos/g, 'Math.cos')
                                 .replace(/tan/g, 'Math.tan')
                                 .replace(/sqrt/g, 'Math.sqrt')
                                 .replace(/pi/g, 'Math.PI');
            
            // Evaluate expression string securely in scope
            return Function('"use strict"; return function(x) { return ' + formatted + ' }')()(x);
        }

        function calculateAndDraw() {
            const fxStr = document.getElementById('fx').value;
            const a = parseFloat(document.getElementById('boundA').value);
            const b = parseFloat(document.getElementById('boundB').value);
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.style.display = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Create a safe operational reference function wrapper
            let f = (x) => 0;
            try {
                // Test parsing
                parseMath(1, fxStr);
                f = (x) => parseMath(x, fxStr);
            } catch (e) {
                errorMsg.style.display = 'block';
                return;
            }

            // 1. Calculate Numerical Integration (Simpsons rule approximation)
            let n = 1000; 
            let h = (b - a) / n;
            let sum = f(a) + f(b);
            
            for (let i = 1; i < n; i++) {
                let x = a + i * h;
                sum += f(x) * (i % 2 === 0 ? 2 : 4);
            }
            let areaResult = (h / 3) * sum;
            document.getElementById('integral-result').innerText = areaResult.toFixed(4);

            // 2. Draw Grid and Axes
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            // Vertical grid lines
            for (let x = 0; x < canvas.width; x += scale) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            // Horizontal grid lines
            for (let y = 0; y < canvas.height; y += scale) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // Main Axes
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, originY); ctx.lineTo(canvas.width, originY); ctx.stroke(); // X axis
            ctx.beginPath(); ctx.moveTo(originX, 0); ctx.lineTo(originX, canvas.height); ctx.stroke(); // Y axis

            // 3. Shade Bounded Area under the curve
            ctx.fillStyle = 'rgba(37, 99, 235, 0.2)'; // semi-transparent Desmos blue
            ctx.beginPath();
            
            let startXPixel = originX + a * scale;
            let endXPixel = originX + b * scale;
            
            ctx.moveTo(startXPixel, originY);
            
            for (let pixelX = startXPixel; pixelX <= endXPixel; pixelX++) {
                let mathX = (pixelX - originX) / scale;
                let mathY = f(mathX);
                let pixelY = originY - mathY * scale;
                ctx.lineTo(pixelX, pixelY);
            }
            
            ctx.lineTo(endXPixel, originY);
            ctx.closePath();
            ctx.fill();

            // 4. Plot the Main Function Curve Line
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 3;
            ctx.beginPath();
            
            let first = true;
            for (let pixelX = 0; pixelX < canvas.width; pixelX++) {
                let mathX = (pixelX - originX) / scale;
                let mathY = f(mathX);
                let pixelY = originY - mathY * scale;

                if (!isNaN(pixelY) && isFinite(pixelY)) {
                    if (first) {
                        ctx.moveTo(pixelX, pixelY);
                        first = false;
                    } else {
                        ctx.lineTo(pixelX, pixelY);
                    }
                }
            }
            ctx.stroke();
        }

        // Event listeners to update instantly upon typing/clicking
        document.getElementById('fx').addEventListener('input', calculateAndDraw);
        document.getElementById('boundA').addEventListener('input', calculateAndDraw);
        document.getElementById('boundB').addEventListener('input', calculateAndDraw);

        // Initial Run
        calculateAndDraw();
    </script>
</body>
</html>
